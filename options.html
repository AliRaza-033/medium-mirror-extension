<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Medium Mirror Redirector - Options</title>
        <style>
            :root {
                color-scheme: light;
            }
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                padding: 20px;
                background: #ffffff;
                color: #111;
            }
            h1 {
                font-size: 18px;
                margin: 0 0 16px 0;
                font-weight: 600;
            }
            h2 {
                font-size: 14px;
                margin: 0 0 10px 0;
                font-weight: 600;
            }
            label {
                display: block;
                font-size: 12px;
                margin-bottom: 6px;
            }
            input[type="url"],
            textarea {
                width: 100%;
                padding: 10px 12px;
                border: 1px solid #ccc;
                border-radius: 6px;
                font-size: 14px;
                box-sizing: border-box;
            }
            textarea {
                min-height: 72px;
                resize: vertical;
            }
            .hint {
                font-size: 12px;
                color: #666;
                margin-top: 6px;
            }
            button {
                margin-top: 12px;
                padding: 10px 12px;
                border: none;
                border-radius: 6px;
                background: #1a73e8;
                color: #fff;
                font-size: 14px;
                cursor: pointer;
            }
            button:hover {
                background: #155fc2;
            }
            .status {
                margin-top: 10px;
                font-size: 12px;
                color: #0a7a2f;
                min-height: 16px;
            }
            .section {
                margin-top: 24px;
                padding-top: 16px;
                border-top: 1px solid #eee;
            }
            .shortcut-label {
                font-size: 12px;
                color: #333;
                margin: 6px 0 10px 0;
            }
            .shortcut-hint {
                font-size: 12px;
                color: #666;
                margin-top: 6px;
            }
        </style>
    </head>
    <body>
        <h1>Settings</h1>
        <label for="base-url">Target Base URL</label>
        <input
            id="base-url"
            type="url"
            placeholder="https://freedium-mirror.cfd/"
            required
        />

        <label for="custom-domains">Allowed Custom Domains (optional)</label>
        <textarea
            id="custom-domains"
            placeholder="example.com, blog.example.org"
        ></textarea>
        <div class="hint">
            Auto-detection checks Medium-hosted pages. Use this only for edge
            cases (comma or new line separated).
        </div>

        <button id="save-btn">Save</button>
        <div class="status" id="status"></div>

        <div class="section">
            <h2>Keyboard Shortcut</h2>
            <div class="shortcut-label" id="current-shortcut">
                Current shortcut: Not set
            </div>
            <button id="open-shortcuts">Set or Change Shortcut</button>
            <div class="shortcut-hint">
                Suggested default: Ctrl+Shift+M (Windows/Linux) or
                Command+Shift+M (macOS).
            </div>
        </div>

        <script src="options.js"></script>
    </body>
</html>
